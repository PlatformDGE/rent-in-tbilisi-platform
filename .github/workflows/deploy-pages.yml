name: Deploy Vite site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Download current Telegram ranking
        run: curl --fail --location --retry 3 --output dist/telegram-top10.json https://platformdge.github.io/-rentintbilisi-crm/telegram-top10.json

      - name: Normalize Telegram map fields
        run: node scripts/prepare-telegram-top10.mjs dist/telegram-top10.json

      - name: Add SPA entry points and fallback
        run: |
          for route in login properties properties/new post-preview telegram agents owners clients deals contracts reports map account analytics districts publications import settings; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done
          cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
