name: Preview Telegram lifecycle

on:
  push:
    branches:
      - feature/telegram-map
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production source
        uses: actions/checkout@v4
        with:
          ref: main
          path: production

      - name: Checkout preview source
        uses: actions/checkout@v4
        with:
          path: preview

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            production/package-lock.json
            preview/package-lock.json

      - name: Build unchanged production site
        working-directory: production
        run: |
          npm ci
          npm run build
          curl --fail --location --retry 3 --output dist/telegram-top10.json https://platformdge.github.io/-rentintbilisi-crm/telegram-top10.json
          node scripts/prepare-telegram-top10.mjs dist/telegram-top10.json
          for route in login properties properties/new post-preview telegram agents owners clients deals contracts reports map account profile analytics districts publications import settings; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done
          cp dist/index.html dist/404.html

      - name: Build Telegram map preview
        working-directory: preview
        env:
          VITE_PUBLIC_BASE_URL: /rent-in-tbilisi-platform/preview/telegram-lifecycle-v2/
          VITE_TELEGRAM_ASSET_BASE_URL: https://raw.githubusercontent.com/PlatformDGE/-rentintbilisi-crm/feature/telegram-map/
        run: |
          npm ci
          npm run build
          curl --fail --location --retry 3 --output dist/telegram-top10.json https://raw.githubusercontent.com/PlatformDGE/-rentintbilisi-crm/feature/telegram-map/telegram-top10.json
          node scripts/prepare-telegram-top10.mjs dist/telegram-top10.json

      - name: Assemble production and isolated preview
        run: |
          mkdir -p site/preview/telegram-lifecycle-v2
          cp -R production/dist/. site/
          cp -R preview/dist/. site/preview/telegram-lifecycle-v2/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload combined Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-preview:
    environment:
      name: github-pages
      url: https://platformdge.github.io/rent-in-tbilisi-platform/preview/telegram-lifecycle-v2/
    needs: build-preview
    runs-on: ubuntu-latest
    steps:
      - name: Deploy production plus isolated preview
        uses: actions/deploy-pages@v4
